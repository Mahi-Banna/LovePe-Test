<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>LovePe | World Class Dating</title>
</head>
<body class="bg-[#FFF5F6]">

    <!-- यहाँ आपका UI (जो हमने बनाया था) आएगा -->
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2P_4MI9Ob7tjaXuw7OqbJglod-i2rL48",
            authDomain: "lovepe.firebaseapp.com",
            projectId: "lovepe",
            storageBucket: "lovepe.firebasestorage.app",
            messagingSenderId: "386724437447",
            appId: "1:386724437447:web:f9de9b221d91e8990acde2",
            measurementId: "G-W27T2CM4H8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        console.log("LovePe Firebase Connected Successfully!");
        
        // अब हम यहाँ एक function बनाएंगे जिससे यूजर की प्रोफाइल डेटाबेस में जाएगी
        window.saveProfile = async (name, rate, service) => {
            try {
                await addDoc(collection(db, "profiles"), {
                    name: name,
                    rate: rate,
                    service: service,
                    createdAt: new Date()
                });
                alert("Profile Created Successfully!");
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        };
    </script>
</body>
</html>
