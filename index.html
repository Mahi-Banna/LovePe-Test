<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>LovePe | Choose Your Path</title>
</head>
<body class="bg-[#FFF5F6] h-screen flex flex-col justify-center items-center">

    <div class="text-center mb-12">
        <h1 class="text-5xl font-black text-[#FF4B5C] mb-4">LOVEPE</h1>
        <p class="text-gray-600 text-lg">Choose how you want to start your journey</p>
    </div>

    <div class="grid md:grid-cols-2 gap-8 w-full max-w-4xl px-6">
        <!-- Option 1: Rent Now -->
        <div onclick="selectRole('seeker')" class="bg-white p-10 rounded-3xl shadow-xl cursor-pointer hover:border-4 border-[#FF4B5C] transition text-center">
            <div class="text-6xl mb-6">🔍</div>
            <h2 class="text-3xl font-bold mb-4">Rent Now</h2>
            <p class="text-gray-500 mb-6">I want to find and hire a companion for my needs.</p>
        </div>

        <!-- Option 2: List Your Profile -->
        <div onclick="selectRole('provider')" class="bg-white p-10 rounded-3xl shadow-xl cursor-pointer hover:border-4 border-[#FF4B5C] transition text-center">
            <div class="text-6xl mb-6">✨</div>
            <h2 class="text-3xl font-bold mb-4">List Your Profile</h2>
            <p class="text-gray-500 mb-6">I want to be hired and earn by offering my services.</p>
        </div>
    </div>

    <!-- Firebase Script Placeholder -->
    <script>
        function selectRole(role) {
            localStorage.setItem('userRole', role);
            alert("Great! You selected: " + role + ". Now let's build your profile.");
            // यहाँ से प्रोफाइल बिल्डिंग पेज पर रिडायरेक्ट करेंगे
        }
    </script>

</body>
</html>
